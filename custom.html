<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Request — Buildora Marketplace</title>
    <meta name="description" content="Request a bespoke academic or startup project built by top developers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/dashboard.css">
    <link rel="stylesheet" href="src/css/custom.css">
    <style>
        /* Custom Request Glass Overrides */
        .dashboard-body {
            background: var(--bg-primary);
        }
        .sidebar {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
        }
        .topbar {
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }
        .custom-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 40px;
            margin: 24px;
        }
        .grid-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }
        .grid-option input:checked + .grid-card {
            background: rgba(124, 58, 237, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }
        .tech-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
        }
        .tech-pill.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .step-circle {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--glass-border);
        }
        .progress-step.active .step-circle {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
        }
    </style>
</head>
<body class="dashboard-body">
    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Background Elements -->
    <div class="hero-bg-grid"></div>
    <div class="hero-particles" id="heroParticles"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="nav-logo">
                <img src="src/assets/buildora-logo.svg" alt="Buildora" class="logo-img" style="width: 32px; height: 32px;">
                <span class="logo-text">&lt;Buildora/&gt;</span>
            </a>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <span class="nav-section-label">Main</span>
                <a href="dashboard.html" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="discover.html" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <span>Marketplace</span>
                </a>
                <a href="custom.html" class="sidebar-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    <span>Custom Requests</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-user">
            <div class="user-avatar">SC</div>
            <div class="user-info">
                <span class="user-name">Sachin Chaudhary</span>
                <span class="user-role">Premium Member</span>
            </div>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-sidebar-btn" id="mobileSidebarBtn" aria-label="Open sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="topbar-greeting">
                    <h1 style="font-family: var(--font-heading); font-weight: 700;">Request <span class="gradient-text">Custom Build</span> 🚀</h1>
                    <p>Tell us your vision, and our senior developers will bring it to life.</p>
                </div>
            </div>
        </header>

        <div class="custom-layout">
            <div class="custom-card" data-aos="fade-up">
                <!-- Step Progress -->
                <div class="step-progress" style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 48px;">
                    <div class="progress-step active" data-step="1" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                        <div class="step-circle" style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">1</div>
                        <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Details</span>
                    </div>
                    <div style="width: 40px; height: 1px; background: var(--glass-border);"></div>
                    <div class="progress-step" data-step="2" style="display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.5;">
                        <div class="step-circle" style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">2</div>
                        <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Tech</span>
                    </div>
                    <div style="width: 40px; height: 1px; background: var(--glass-border);"></div>
                    <div class="progress-step" data-step="3" style="display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.5;">
                        <div class="step-circle" style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">3</div>
                        <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Budget</span>
                    </div>
                </div>

                <form id="customBuildForm" class="contact-form">
                    <!-- Step 1: Core Details -->
                    <div class="form-step active" id="step1">
                        <h2 style="font-family: var(--font-heading); margin-bottom: 8px;">What are we building?</h2>
                        <p style="color: var(--text-secondary); margin-bottom: 32px;">Provide a clear vision for your bespoke project.</p>
                        
                        <div class="form-group">
                            <label>Project Title</label>
                            <input type="text" id="projectTitle" placeholder="e.g. AI-Powered Resume Screener" required>
                        </div>

                        <div class="form-group" style="margin-top: 24px;">
                            <label>Project Domain</label>
                            <div class="grid-select" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px;">
                                <label class="grid-option">
                                    <input type="radio" name="domain" value="ai" checked style="display: none;">
                                    <div class="grid-card" style="padding: 20px; border-radius: var(--radius-lg); text-align: center; cursor: pointer;">
                                        <span style="font-size: 24px; display: block; margin-bottom: 8px;">🤖</span>
                                        <span style="font-size: 14px; font-weight: 600;">AI / ML</span>
                                    </div>
                                </label>
                                <label class="grid-option">
                                    <input type="radio" name="domain" value="web" style="display: none;">
                                    <div class="grid-card" style="padding: 20px; border-radius: var(--radius-lg); text-align: center; cursor: pointer;">
                                        <span style="font-size: 24px; display: block; margin-bottom: 8px;">🌐</span>
                                        <span style="font-size: 14px; font-weight: 600;">Web App</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="form-group" style="margin-top: 24px;">
                            <label>Requirements</label>
                            <textarea id="projectDesc" rows="5" placeholder="Core features, unique aspects, etc..." required></textarea>
                        </div>

                        <div style="margin-top: 32px; text-align: right;">
                            <button type="button" class="btn-primary next-btn" style="padding: 12px 32px;">Next Step →</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="src/js/script.js"></script>
    <script type="module" src="src/js/custom.js"></script>
</body>
</html>
