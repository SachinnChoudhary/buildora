<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace — Buildora</title>
    <meta name="description" content="Browse 500+ premium academic projects. Instant download, code, reports, and AI deployment.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/dashboard.css">
    <link rel="stylesheet" href="src/css/discover.css">
    <style>
        /* Marketplace Specific Glass Overrides */
        .dashboard-body {
            background: var(--bg-primary);
        }
        .sidebar {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
        }
        .topbar {
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }
        .filters-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px;
        }
        .disc-project-card {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid var(--glass-border) !important;
            transition: var(--transition) !important;
        }
        .disc-project-card:hover {
            background: rgba(255, 255, 255, 0.06) !important;
            border-color: var(--primary-light) !important;
            transform: translateY(-8px) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
        }
        .ai-rec-banner {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), rgba(249, 115, 22, 0.1));
            border: 1px solid rgba(124, 58, 237, 0.3);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="dashboard-body">
    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Background Elements -->
    <div class="hero-bg-grid"></div>
    <div class="hero-particles" id="heroParticles"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="nav-logo">
                <img src="src/assets/buildora-logo.svg" alt="Buildora" class="logo-img" style="width: 32px; height: 32px;">
                <span class="logo-text">&lt;Buildora/&gt;</span>
            </a>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <span class="nav-section-label">Main</span>
                <a href="dashboard.html" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="discover.html" class="sidebar-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <span>Marketplace</span>
                </a>
                <a href="#" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                    <span>My Purchases</span>
                </a>
                <a href="custom.html" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    <span>Custom Requests</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-user">
            <div class="user-avatar">SC</div>
            <div class="user-info">
                <span class="user-name">Sachin Chaudhary</span>
                <span class="user-role">Pro Student</span>
            </div>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-sidebar-btn" id="mobileSidebarBtn" aria-label="Open sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="topbar-greeting">
                    <h1 style="font-family: var(--font-heading); font-weight: 700;">Project <span class="gradient-text">Marketplace</span> 🛒</h1>
                    <p>Access 500+ premium projects for instant academic success.</p>
                </div>
            </div>
            <div class="topbar-right">
                <div class="search-box glass-card" style="padding: 8px 16px; border-radius: var(--radius-full); display: flex; align-items: center; gap: 10px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" placeholder="Search marketplace..." id="searchInput" style="background: transparent; border: none; color: white; outline: none; font-size: 14px;">
                </div>
            </div>
        </header>

        <div class="discover-layout" style="padding: 24px;">
            <!-- Filters Sidebar -->
            <aside class="filters-panel" id="filtersPanel">
                <div class="filter-section">
                    <h3 style="font-family: var(--font-heading); font-size: 16px; margin-bottom: 16px;">Domain</h3>
                    <div class="filter-options">
                        <label class="filter-check"><input type="checkbox" value="ai" checked><span class="checkmark"></span>AI / ML</label>
                        <label class="filter-check"><input type="checkbox" value="web" checked><span class="checkmark"></span>Web Dev</label>
                        <label class="filter-check"><input type="checkbox" value="blockchain"><span class="checkmark"></span>Blockchain</label>
                    </div>
                </div>
                <button class="btn-primary btn-full" id="applyFilters" style="margin-top: 24px;">Apply Filters</button>
            </aside>

            <!-- Projects Grid -->
            <div class="discover-main" style="margin-left: 24px;">
                <!-- AI Recommendation Banner -->
                <div class="ai-rec-banner" style="margin-bottom: 32px; padding: 24px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <h3 style="font-family: var(--font-heading); font-weight: 700; margin-bottom: 8px;">🔥 Featured: Full Stack AI Bundle</h3>
                        <p style="font-size: 14px; opacity: 0.8;">Get SmartAttend + Reports + Diagrams at 40% off today.</p>
                    </div>
                    <button class="btn-primary btn-sm">Claim Deal →</button>
                </div>

                <div class="discover-grid" id="discoverGrid">
                    <!-- Cards injected by discover.js -->
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="src/js/script.js"></script>
    <script type="module" src="src/js/discover.js"></script>
</body>
</html>
