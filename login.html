<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Buildora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Background Elements -->
    <div class="hero-bg-grid"></div>
    <div class="hero-particles" id="heroParticles"></div>

    <main class="auth-hero">
        <div class="login-container">
            <div class="form-glass" data-aos="fade-up">
                <div class="login-header">
                    <a href="index.html" class="nav-logo">
                        <img src="src/assets/buildora-logo.svg" alt="Buildora" class="logo-img" style="width: 48px; height: 48px;">
                        <span class="logo-text" style="font-size: 28px;">&lt;Buildora/&gt;</span>
                    </a>
                    <h1 style="font-family: var(--font-heading); font-size: 32px; font-weight: 700; margin-top: 16px;">Welcome Back</h1>
                    <p style="color: var(--text-secondary); margin-top: 8px;">Log in to access your projects and requests</p>
                </div>

                <!-- Google Sign-In Button -->
                <button id="googleSignIn" class="btn-lg btn-full" style="margin-bottom: 20px; background: #fff; color: #333; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; font-weight: 600; transition: all 0.3s ease;">
                    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Continue with Google
                </button>

                <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                    <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.1);"></div>
                    <span style="color: var(--text-muted); font-size: 13px;">or sign in with email</span>
                    <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.1);"></div>
                </div>

                <form id="loginForm" class="contact-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="name@company.com" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label for="password">Password</label>
                            <a href="#" style="font-size: 13px; color: var(--primary-light); text-decoration: none;">Forgot Password?</a>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
                    </div>

                    <div id="authError" style="display: none; color: #ef4444; font-size: 14px; padding: 10px; border-radius: 8px; background: rgba(239,68,68,0.1); margin-top: 8px;"></div>

                    <button type="submit" class="btn-primary btn-lg btn-full" style="margin-top: 24px;">Sign In to Dashboard</button>
                    
                    <div style="text-align: center; margin-top: 24px; color: var(--text-secondary); font-size: 15px;">
                        Don't have an account? <a href="signup.html" style="color: var(--primary-light); font-weight: 600; text-decoration: none; border-bottom: 1px dashed var(--primary-light);">Create Account</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="src/js/script.js"></script>
    <script type="module">
        import { loginWithEmail, loginWithGoogle, onAuthChange } from './src/js/firebase.js';

        // If already logged in, redirect
        onAuthChange((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        const errorDiv = document.getElementById('authError');
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        // Email/Password Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                const user = await loginWithEmail(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                localStorage.setItem('buildora_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName
                }));
                window.location.href = 'dashboard.html';
            } catch (err) {
                const messages = {
                    'auth/user-not-found': 'No account found with this email.',
                    'auth/wrong-password': 'Incorrect password.',
                    'auth/invalid-credential': 'Invalid email or password.',
                    'auth/too-many-requests': 'Too many attempts. Try again later.',
                    'auth/invalid-email': 'Invalid email address.'
                };
                showError(messages[err.code] || 'Login failed. Please try again.');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // Google Sign-In
        document.getElementById('googleSignIn').addEventListener('click', async () => {
            try {
                const user = await loginWithGoogle();
                localStorage.setItem('buildora_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName,
                    photoURL: user.photoURL
                }));
                window.location.href = 'dashboard.html';
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showError('Google sign-in failed. Try again.');
                }
            }
        });
    </script>
</body>
</html>
