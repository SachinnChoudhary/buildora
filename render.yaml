# Render Blueprint — Buildora Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: buildora-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # Set manually after creating Supabase DB
      - key: FRONTEND_URL
        value: https://buildora.netlify.app
      - key: PYTHON_VERSION
        value: "3.11.0"
